<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperman Solutions - Login</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .logo h2 {
            font-weight: 700;
            color: #1a365d;
        }
        .login-card .logo span {
            color: #4a5568;
            font-weight: 300;
        }
        .login-card .logo .tagline {
            color: #718096;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .login-card .logo .divider {
            width: 40px;
            height: 3px;
            background: #1a365d;
            margin: 8px auto 0;
            border-radius: 2px;
        }
        .login-card .form-control {
            height: 44px;
            border-radius: 6px;
            border: 2px solid #e2e8f0;
        }
        .login-card .form-control:focus {
            border-color: #1a365d;
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
        }
        .login-card .btn-login {
            width: 100%;
            height: 44px;
            background: #1a365d;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .login-card .btn-login:hover {
            background: #0f2440;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h2>Paperman<span>Solutions</span></h2>
                <div class="tagline">Financial Services</div>
                <div class="divider"></div>
            </div>

            <h4 style="font-weight: 700;">Welcome Back</h4>
            <p style="color: #4a5568; margin-bottom: 24px;">Sign in to manage your loans</p>

            {% if error %}
            <div class="alert alert-danger py-2" style="font-size: 14px;">{{ error }}</div>
            {% endif %}

            <form method="post" action="/auth/login">
                <div class="mb-3">
                    <label style="font-weight: 600; font-size: 13px; color: #4a5568;">Username</label>
                    <input type="text" class="form-control" name="username" placeholder="Enter your username" required autofocus>
                </div>

                <div class="mb-3">
                    <label style="font-weight: 600; font-size: 13px; color: #4a5568;">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="text-center mt-4">
                <p style="color: #a0aec0; font-size: 12px; margin: 0;">© 2026 Paperman Solutions (Pty) Ltd</p>
            </div>
        </div>
    </div>
</body>
</html>
