{% extends "base.html" %}
{% block content %}
<h2>Upload Document</h2>
<form method="post" action="/documents/upload" enctype="multipart/form-data">
    <div class="mb-3"><label>Customer</label><select name="customer_id" class="form-select" required>{% for c in customers %}<option value="{{ c.id }}" {% if selected_customer == c.id %}selected{% endif %}>{{ c.first_name }} {{ c.last_name }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label>Loan (optional)</label><select name="loan_id" class="form-select"><option value="">None</option>{% for l in loans %}<option value="{{ l.id }}" {% if selected_loan == l.id %}selected{% endif %}>Loan #{{ l.id }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label>Document Type</label><select name="file_type" class="form-select" required><option>id_copy</option><option>agreement</option><option>proof_income</option><option>other</option></select></div>
    <div class="mb-3"><label>File</label><input type="file" name="file" class="form-control" required></div>
    <button type="submit" class="btn btn-primary">Upload</button>
</form>
{% endblock %}
