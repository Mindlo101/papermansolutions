{% extends "base.html" %}
{% block content %}
<h2 class="top-title mb-4">📄 Upload Document</h2>

<div class="card section-card">
    <div class="card-body">
        <form method="post" action="/documents/upload" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Customer</label>
                <select name="customer_id" class="form-select" required>
                    <option value="">Select Customer</option>
                    {% for c in customers %}
                    <option value="{{ c.id }}" {% if selected_customer == c.id %}selected{% endif %}>
                        {{ c.first_name }} {{ c.last_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Loan (Optional)</label>
                <select name="loan_id" class="form-select">
                    <option value="0">None</option>
                    {% for l in loans %}
                    <option value="{{ l.id }}" {% if selected_loan == l.id %}selected{% endif %}>
                        Loan #{{ l.id }} - Customer: {{ l.customer.first_name }} {{ l.customer.last_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Document Type</label>
                <select name="file_type" class="form-select" required>
                    <option value="id_copy">ID Copy</option>
                    <option value="agreement">Signed Agreement</option>
                    <option value="proof_income">Proof of Income</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">File</label>
                <input type="file" name="file" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Upload Document</button>
        </form>
    </div>
</div>

<a href="/customers/" class="btn btn-secondary mt-3">Back to Customers</a>

{% endblock %}
