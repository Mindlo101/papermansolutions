{% extends "base.html" %}
{% block content %}
<h2 class="top-title mb-4">Reports</h2>

<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card section-card">
            <div class="card-body text-center">
                <div style="font-size: 48px; margin-bottom: 12px;">📊</div>
                <h5>Aging Report</h5>
                <p class="text-muted">View outstanding balances by days overdue</p>
                <a href="/reports/aging" class="btn btn-dark">View Report</a>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-4">
        <div class="card section-card">
            <div class="card-body text-center">
                <div style="font-size: 48px; margin-bottom: 12px;">💰</div>
                <h5>Daily Cash Report</h5>
                <p class="text-muted">View today's collections and payments</p>
                <a href="/reports/daily-cash" class="btn btn-dark">View Report</a>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-4">
        <div class="card section-card">
            <div class="card-body text-center">
                <div style="font-size: 48px; margin-bottom: 12px;">📋</div>
                <h5>Loan Register</h5>
                <p class="text-muted">Complete list of all loans with details</p>
                <a href="/reports/loan-register" class="btn btn-dark">View Report</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
