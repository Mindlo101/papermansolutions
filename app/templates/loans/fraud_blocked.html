{% if can_override %}
<form action="/loans/{{ loan.id }}/override-fraud" method="post">
    <div class="alert alert-warning">
        <strong>⚠️ Admin Override Required</strong><br>
        This loan was blocked by AI fraud detection. Only Admin can override this decision.
    </div>
    <div class="mb-3">
        <label class="form-label">Override Reason</label>
        <textarea name="override_reason" class="form-control" rows="2" placeholder="Explain why this loan should be approved despite AI flags..." required></textarea>
    </div>
    <button type="submit" class="btn btn-danger">⚠️ Override & Approve</button>
    <a href="/loans/" class="btn btn-secondary">Cancel</a>
</form>
{% endif %}
