{% extends "base.html" %}
{% block content %}
<h2 class="top-title mb-4">Edit Customer</h2>

{% if error %}
<div class="alert alert-danger">
    <strong>Error:</strong> {{ error }}
</div>
{% endif %}

<div class="card section-card">
    <div class="card-body">
        <form method="post" action="/customers/{{ customer.id }}/edit">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" value="{{ customer.first_name }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" value="{{ customer.last_name }}" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">ID Number</label>
                <input type="text" name="id_number" class="form-control {% if error %}is-invalid{% endif %}" 
                       value="{{ customer.id_number }}" required>
                {% if error %}
                <div class="invalid-feedback">{{ error }}</div>
                {% else %}
                <small class="text-muted">This ID number must be unique in the system.</small>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" value="{{ customer.phone }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email (Optional)</label>
                <input type="email" name="email" class="form-control" value="{{ customer.email or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Address (Optional)</label>
                <textarea name="address" class="form-control" rows="2">{{ customer.address or '' }}</textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Employer (Optional)</label>
                        <input type="text" name="employer" class="form-control" value="{{ customer.employer or '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Monthly Income (Optional)</label>
                        <input type="number" step="0.01" name="monthly_income" class="form-control" value="{{ customer.monthly_income or 0 }}">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Update Customer</button>
        </form>
    </div>
</div>

<a href="/customers/{{ customer.id }}" class="btn btn-secondary mt-3">Back to Customer Details</a>

{% endblock %}
